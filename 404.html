<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#B32017">
<title>404 · Không tìm thấy trang / Page not found</title>
<style>
:root{ --red:#B32017; --ink:#20242A; --bg:#E9EBE6 }
*{box-sizing:border-box}
html{font-size:17px}
body{
  margin:0; min-height:100vh; background:var(--bg); color:var(--ink);
  font-family:system-ui,'Segoe UI',Roboto,sans-serif; line-height:1.5;
  display:flex; align-items:center; justify-content:center; padding:16px;
}
.sign{
  background:var(--red); color:#fff; border-radius:14px; max-width:520px;
  padding:28px 22px; text-align:center;
  box-shadow:inset 0 0 0 3px var(--red), inset 0 0 0 6px #fff, 0 4px 14px rgba(0,0,0,.2);
}
h1{font-size:2.4rem; font-weight:900; margin:0 0 4px; letter-spacing:.04em}
p{margin:0 0 6px}
.en{font-size:.9rem; opacity:.9}
a.home-btn{
  display:inline-block; margin-top:10px; padding:13px 22px; min-height:48px;
  background:#fff; color:var(--red); font-weight:800; text-decoration:none;
  border-radius:12px; box-sizing:border-box;
}
</style>
</head>
<body>
<main class="sign">
  <h1>WRONG WAY</h1>
  <p>Không tìm thấy trang này.</p>
  <p class="en">This page was not found.</p>
  <p><a class="home-btn" href="./">← Về trang chính · Back home</a></p>
</main>
</body>
</html>
