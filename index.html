<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#046A38">
<meta name="description" content="Luyện thi bằng lái xe miễn phí — Free US driver's license practice test. Tiếng Việt + English.">
<title>Luyện Thi Bằng Lái Xe · US Driver's License Practice</title>
<style>
:root{
  --green:#046A38; --green-dk:#03572E; --yellow:#FFC72C; --ink:#20242A;
  --bg:#E9EBE6; --muted:#5B6169;
}
*{box-sizing:border-box}
html{font-size:17px}
body{
  margin:0; min-height:100vh; background:var(--bg); color:var(--ink);
  font-family:system-ui,'Segoe UI',Roboto,sans-serif; line-height:1.5;
  display:flex; align-items:center; justify-content:center; padding:16px;
}
.sign{
  background:var(--green); color:#fff; border-radius:14px; max-width:560px;
  padding:28px 22px; text-align:center;
  box-shadow:inset 0 0 0 3px var(--green), inset 0 0 0 6px #fff, 0 4px 14px rgba(0,0,0,.2);
}
.route{
  display:inline-block; background:#fff; color:var(--green-dk);
  font-weight:900; font-size:.72rem; letter-spacing:.14em;
  padding:3px 12px; border-radius:999px; margin-bottom:10px;
}
h1{font-size:1.5rem; font-weight:900; margin:0 0 6px; line-height:1.2}
.en{font-size:.95rem; opacity:.92; margin:0 0 14px}
.status{
  background:var(--yellow); color:var(--ink); border-radius:10px;
  font-weight:700; font-size:.95rem; padding:10px 14px; margin-top:8px;
}
.status .s-en{display:block; font-weight:500; font-size:.85rem; color:#3d4147}
</style>
</head>
<body>
<main class="sign">
  <span class="route">US • 50 STATES</span>
  <h1>Luyện Thi Bằng Lái Xe</h1>
  <p class="en">US Driver's License Practice — Vietnamese &amp; English</p>
  <div class="status">
    Ứng dụng đang được xây dựng — sắp ra mắt!
    <span class="s-en">The app is under construction — coming soon!</span>
  </div>
</main>
</body>
</html>
